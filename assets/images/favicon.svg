<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Background rounded square -->
  <rect width="64" height="64" rx="12" fill="#1A4DA5"/>
  <!-- IC chip body -->
  <rect x="14" y="22" width="36" height="20" rx="2.5" fill="none" stroke="#FFFFFF" stroke-width="3"/>
  <!-- Top pins (5) -->
  <g fill="#FFFFFF">
    <rect x="17" y="14" width="3" height="8" rx="0.5"/>
    <rect x="23" y="14" width="3" height="8" rx="0.5"/>
    <rect x="29" y="14" width="3" height="8" rx="0.5"/>
    <rect x="35" y="14" width="3" height="8" rx="0.5"/>
    <rect x="41" y="14" width="3" height="8" rx="0.5"/>
  </g>
  <!-- Bottom pins (5) -->
  <g fill="#FFFFFF">
    <rect x="17" y="42" width="3" height="8" rx="0.5"/>
    <rect x="23" y="42" width="3" height="8" rx="0.5"/>
    <rect x="29" y="42" width="3" height="8" rx="0.5"/>
    <rect x="35" y="42" width="3" height="8" rx="0.5"/>
    <rect x="41" y="42" width="3" height="8" rx="0.5"/>
  </g>
  <!-- "H" inside chip body -->
  <text x="32" y="38.5" font-family="Arial Black, Arial, sans-serif" font-size="14" font-weight="900" text-anchor="middle" fill="#FFFFFF">H</text>
</svg>
